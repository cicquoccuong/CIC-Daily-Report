[project]
name = "cic-daily-report"
version = "0.1.0"
description = "Automated crypto daily report pipeline for CIC community"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "gspread>=6.0",
    "google-auth>=2.0",
    "python-telegram-bot>=21.0",
    "feedparser>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "pytest-cov>=6.0",
    "ruff>=0.8",
]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src/cic_daily_report"]

[tool.coverage.report]
fail_under = 60
