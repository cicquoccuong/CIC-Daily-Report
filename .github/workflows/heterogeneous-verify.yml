name: Heterogeneous Verifier (Cross-Family Code Review)

# WHY (Wave 0.9, 2026-05-03): Claude monoculture (Quinn + Winston + Devil are
# all Claude variants) creates echo chamber. This workflow runs an independent
# model from a DIFFERENT family (GPT-4o-mini via OpenRouter) on every PR that
# touches Python source. Output is posted as PR comment — ADVISORY ONLY,
# never blocks merge. Operator reads + decides.

on:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'scripts/**/*.py'

jobs:
  heterogeneous-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write  # needed to post review comment
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git diff base..HEAD

      - name: Skip if API key missing
        id: check_key
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "::warning::OPENROUTER_API_KEY not set — skipping heterogeneous review"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: astral-sh/setup-uv@v5
        if: steps.check_key.outputs.skip == 'false'

      - name: Get changed Python files
        if: steps.check_key.outputs.skip == 'false'
        id: changed
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- 'src/**/*.py' 'scripts/**/*.py' | head -10)
          if [ -z "$CHANGED" ]; then
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run heterogeneous verifier
        if: steps.check_key.outputs.skip == 'false' && steps.changed.outputs.files != ''
        # WHY (Wave 0.9.1): defense-in-depth — heterogeneous verifier là advisory
        # only. Nếu script crash bất ngờ, workflow vẫn pass để PR không bị block.
        # Cụ thể là 402 Payment Required (free credit cạn) đã từng block PR #26.
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          uv run python scripts/heterogeneous_verify.py --ci ${{ steps.changed.outputs.files }} > review.md 2>&1 || true
          head -200 review.md > review_capped.md

      - name: Post review as PR comment
        if: steps.check_key.outputs.skip == 'false' && steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review_capped.md', 'utf8');
            const body = `## 🤖 Heterogeneous Verifier (GPT-4o-mini)\n\n_External-model review breaking Claude monoculture (Wave 0.9)_\n\n${review}\n\n---\n_Auto-generated. Operator decides — NOT auto-blocking._`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
