name: Daily Pipeline

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC = 08:00 VN
  workflow_dispatch:      # manual trigger
  push:
    branches: [master]
    paths: ['.github/workflows/daily-pipeline.yml']

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}" ]; then MISSING="$MISSING GOOGLE_SHEETS_CREDENTIALS"; fi
          if [ -z "${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}" ]; then MISSING="$MISSING GOOGLE_SHEETS_SPREADSHEET_ID"; fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then MISSING="$MISSING TELEGRAM_BOT_TOKEN"; fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then MISSING="$MISSING TELEGRAM_CHAT_ID"; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then MISSING="$MISSING GROQ_API_KEY"; fi
          if [ -z "${{ secrets.CRYPTOPANIC_API_KEY }}" ]; then MISSING="$MISSING CRYPTOPANIC_API_KEY"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Go to Settings > Secrets and variables > Actions to add them."
            exit 1
          fi
          echo "All required secrets configured."

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run daily pipeline
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
        run: uv run cic-daily

      - name: Update dashboard on gh-pages
        if: always()
        run: |
          if [ ! -f dashboard-data.json ]; then
            echo "No dashboard-data.json, skipping"
            exit 0
          fi
          NEW_HASH=$(sha256sum dashboard-data.json | cut -d' ' -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          OLD_HASH=$(sha256sum dashboard-data.json 2>/dev/null | cut -d' ' -f1 || echo "none")
          git stash pop 2>/dev/null || true
          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "Dashboard data unchanged"
            exit 0
          fi
          git add dashboard-data.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore: update dashboard data $TIMESTAMP" || true
          git push origin gh-pages || true
