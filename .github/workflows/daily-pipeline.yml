name: Daily Pipeline

on:
  schedule:
    - cron: '5 1 * * *'  # 01:05 UTC = 08:05 VN (offset 5m to avoid collision with breaking-news at :00)
  workflow_dispatch:      # manual trigger

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

# PR#1 Emergency Fix (F3): grant issues:write so the auto-incident step below
# can create a GitHub Issue when the pipeline hangs / is cancelled / fails.
# WHY: default GITHUB_TOKEN is read-only for issues; without this the
# github-script step would 403 on every incident and we'd stay silent.
permissions:
  contents: write     # needed by gh-pages dashboard commit step
  issues: write       # needed by auto-incident step

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}" ]; then MISSING="$MISSING GOOGLE_SHEETS_CREDENTIALS"; fi
          if [ -z "${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}" ]; then MISSING="$MISSING GOOGLE_SHEETS_SPREADSHEET_ID"; fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then MISSING="$MISSING TELEGRAM_BOT_TOKEN"; fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then MISSING="$MISSING TELEGRAM_CHAT_ID"; fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then MISSING="$MISSING GROQ_API_KEY"; fi
          if [ -z "${{ secrets.CRYPTOPANIC_API_KEY }}" ]; then MISSING="$MISSING CRYPTOPANIC_API_KEY"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Go to Settings > Secrets and variables > Actions to add them."
            exit 1
          fi
          echo "All required secrets configured."

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run daily pipeline
        id: pipeline
        # PR#1 Emergency Fix (F3): removed `continue-on-error: true`.
        # WHY: that flag was masking pipeline crashes as "success", so failure()
        # never fired and Telegram alerts were silenced. We still get retry
        # semantics via the explicit "Retry pipeline on failure" step below,
        # which keys off steps.pipeline.outcome == 'failure'.
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY_DR: ${{ secrets.GEMINI_API_KEY_DR }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          WHALE_ALERT_API_KEY: ${{ secrets.WHALE_ALERT_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          SENTINEL_SPREADSHEET_ID: ${{ secrets.SENTINEL_SPREADSHEET_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          # Wave 0.8.1 fix: Wave 0.6 feature flags (same as breaking-news.yml).
          WAVE_0_6_ENABLED: ${{ secrets.WAVE_0_6_ENABLED }}
          WAVE_0_6_DATE_BLOCK: ${{ secrets.WAVE_0_6_DATE_BLOCK }}
          WAVE_0_6_2SOURCE_REQUIRED: ${{ secrets.WAVE_0_6_2SOURCE_REQUIRED }}
          WAVE_0_6_KILL_SWITCH: ${{ secrets.WAVE_0_6_KILL_SWITCH }}
        run: uv run cic-daily

      - name: Retry pipeline on failure
        id: retry
        if: steps.pipeline.outcome == 'failure'
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY_DR: ${{ secrets.GEMINI_API_KEY_DR }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          WHALE_ALERT_API_KEY: ${{ secrets.WHALE_ALERT_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          SENTINEL_SPREADSHEET_ID: ${{ secrets.SENTINEL_SPREADSHEET_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          echo "Pipeline failed, retrying after 30s..."
          sleep 30
          uv run cic-daily

      - name: Update dashboard on gh-pages
        if: always()
        run: |
          if [ ! -f gh-pages/dashboard-data.json ]; then
            echo "No dashboard-data.json generated, skipping"
            exit 0
          fi
          cp gh-pages/dashboard-data.json /tmp/dashboard-data.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          cp /tmp/dashboard-data.json dashboard-data.json
          if git diff --quiet dashboard-data.json 2>/dev/null; then
            echo "Dashboard data unchanged"
            exit 0
          fi
          git add dashboard-data.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore: update dashboard data $TIMESTAMP" || true
          for i in 1 2 3; do
            git pull --rebase origin gh-pages 2>/dev/null || true
            git push origin gh-pages && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Notify failure via Telegram
        # Fires on any cancel (includes 2h GH timeout hang) or failure — matches auto-issue step
        # WHY simplified from review blocker: in cancelled() context,
        # steps.pipeline.outcome can be unavailable or 'cancelled' rather than
        # 'failure' — the old nested condition risked NOT firing exactly in the
        # hang scenario this PR exists to fix. cancelled() || failure() is the
        # same robust pattern used by the auto-issue step below.
        if: cancelled() || failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 -c "
          import json, urllib.request
          msg = '\u26a0\ufe0f [CIC Daily Report] Pipeline TH\u1ea4T B\u1ea0I\n\nTh\u1eddi gian: ${TIMESTAMP}\nC\u1ea3 2 l\u1ea7n ch\u1ea1y \u0111\u1ec1u l\u1ed7i.\n\nKi\u1ec3m tra log: ${RUN_URL}'
          data = json.dumps({'chat_id': '${TELEGRAM_CHAT_ID}', 'text': msg}).encode()
          req = urllib.request.Request(
              'https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage',
              data=data, headers={'Content-Type': 'application/json'})
          try:
              urllib.request.urlopen(req, timeout=10)
          except Exception as e:
              print(f'TG notification failed (non-critical): {e}')
          "

      # PR#1 Emergency Fix (F3): open a tracked GitHub Issue on every incident
      # so we have a permanent, searchable record (Telegram alerts scroll away).
      # Fires on BOTH cancelled() (job timeout / hang) and failure() (explicit
      # crash). Labels with 'pipeline-incident' for easy filtering.
      - name: Auto-create GitHub Issue on pipeline incident
        if: cancelled() || failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Pipeline Incident — ${context.workflow} #${context.runNumber}`;
            const body = `## Incident\n- Run: ${runUrl}\n- Status: ${context.job} ${context.jobStatus}\n- Commit: ${context.sha.substring(0,7)}\n\nPlease investigate logs.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['pipeline-incident'],
            });
